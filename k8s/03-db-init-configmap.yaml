apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-script
  namespace: nagp-assignment
data:
  init.sql: |
    create table if not exists products (
      id serial primary key,
      name varchar(100) not null,
      category varchar(50) not null,
      price numeric(10,2) not null,
      stock integer not null
    );

    insert into products (id, name, category, price, stock) values
      (1, 'Laptop Stand', 'Accessories', 1299.00, 22),
      (2, 'Wireless Mouse', 'Accessories', 799.00, 40),
      (3, 'Mechanical Keyboard', 'Accessories', 3499.00, 15),
      (4, 'USB-C Hub', 'Accessories', 2499.00, 18),
      (5, 'Noise Cancelling Headphones', 'Audio', 6999.00, 9),
      (6, 'Webcam 1080p', 'Camera', 2199.00, 13),
      (7, 'Portable SSD 1TB', 'Storage', 7899.00, 11),
      (8, '27 Inch Monitor', 'Display', 15999.00, 7)
    on conflict (id) do nothing;
